# SureJack nginx 配置 —— 完整版：HTTPS + HTTP 强制跳转
#
# ⚠️ 独立 server block，与 plus.drziangchen.uk 完全无关，绝不影响它。
# 证书由 certbot（Let's Encrypt）签发，自动续期。

# HTTP：只保留 ACME 挑战路径，其余全部 301 跳 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name surejack.zacchen.win;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS：真正的服务
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name surejack.zacchen.win;

    ssl_certificate     /etc/letsencrypt/live/surejack.zacchen.win/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/surejack.zacchen.win/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # 背景视频上传大，必须放开 body 上限（默认 1M 会挡住）
    client_max_body_size 500M;

    location / {
        proxy_pass http://127.0.0.1:8809;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # 只追加真实客户端IP到 XFF 末尾，配合后端 trustProxy:'127.0.0.1'
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE（导出进度）需要：关闭缓冲、长超时
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
