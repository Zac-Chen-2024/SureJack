# SureJack nginx 配置 —— 阶段一：仅 HTTP（用于 certbot 签证书）
# 签好证书后换成 nginx-surejack.conf（含 443 + 强制跳转）
#
# ⚠️ 这是独立的 server block，与 plus.drziangchen.uk 完全无关，绝不影响它。

server {
    listen 80;
    listen [::]:80;
    server_name surejack.zacchen.win;

    # certbot webroot 挑战路径（签证书时用）
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 背景视频上传大，必须放开 body 上限（默认 1M 会挡住）
    client_max_body_size 500M;

    location / {
        proxy_pass http://127.0.0.1:8809;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # ⚠️ 关键：只追加真实客户端IP到 XFF 末尾，配合后端 trustProxy:'127.0.0.1'
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE（导出进度）需要：关闭缓冲、长超时
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }
}
